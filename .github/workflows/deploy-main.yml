name: Deploy Aspire App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SECRETS_JSON: ${{ toJSON(secrets) }}

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          required=(
            PORTAINER_API_TOKEN
            PORTAINER_URL
            POSTGRES_USER
            POSTGRES_PASSWORD
            TELEGRAM_BOT_TOKEN
            TRAKT_CLIENT_ID
            TRAKT_CLIENT_SECRET
            TMDB_API_KEY
          )

          for name in "${required[@]}"; do
            value=$(echo "$SECRETS_JSON" | jq -r --arg k "$name" '.[$k] // empty')
            if [ -z "$value" ]; then
              echo "Missing required GitHub secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Check out repository
        uses: actions/checkout@v4

      # Export all non-Portainer secrets as both plain env vars and
      # Parameters__ aliases for Aspire's .NET configuration binding.
      - name: Export secrets for Aspire
        shell: bash
        run: |
          echo '${{ toJSON(secrets) }}' | jq -r '
            to_entries[]
            | select(.key | test("^PORTAINER_|^GITHUB_") | not)
            | "\(.key)=\(.value)",
              "Parameters__\(.key | ascii_downcase | gsub("_";"-"))=\(.value)"
          ' >> "$GITHUB_ENV"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install Aspire CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Show Aspire CLI version
        shell: bash
        run: aspire --version

      - name: Push images and prepare env with Aspire
        shell: bash
        run: aspire do push-and-prepare-env --environment production --non-interactive

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aspire-output
          path: aspire-output/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: aspire-output
          path: aspire-output/

      - name: Debug - show generated files
        shell: bash
        run: |
          echo "=== files in aspire-output ==="
          ls -la aspire-output/
          echo ""
          echo "=== .env files ==="
          for f in aspire-output/.env*; do
            echo "--- $f ---"
            cat "$f" 2>/dev/null || echo "not found"
          done

      - name: Deploy to Portainer
        uses: cssnr/portainer-stack-deploy-action@v1
        with:
          token: ${{ secrets.PORTAINER_API_TOKEN }}
          url: ${{ secrets.PORTAINER_URL }}
          endpoint: 3
          name: trakt-tg-bot
          type: file
          file: aspire-output/docker-compose.yaml
          env_file: aspire-output/.env.production
          standalone: true
          pull: true
          prune: true
