name: Deploy Aspire App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # App secret names listed once — used by validation and Parameters__ generation.
  APP_SECRETS: "POSTGRES_USER POSTGRES_PASSWORD TELEGRAM_BOT_TOKEN TRAKT_CLIENT_ID TRAKT_CLIENT_SECRET TMDB_API_KEY"

  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
  TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
  TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate secrets and export Aspire env aliases
        shell: bash
        run: |
          set -euo pipefail

          # Validate app secrets are set (Aspire needs them via Parameters__)
          for var in $APP_SECRETS; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required GitHub secret: ${var}" >&2
              exit 1
            fi
          done

          # Generate Parameters__ aliases from APP_SECRETS for Aspire's
          # .NET configuration binding (Parameters:key -> Parameters__key).
          # Kebab-case is derived automatically: TRAKT_CLIENT_ID -> trakt-client-id
          for var in $APP_SECRETS; do
            kebab=$(echo "$var" | tr '[:upper:]_' '[:lower:]-')
            echo "Parameters__${kebab}=${!var}" >> "$GITHUB_ENV"
          done

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install Aspire CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Show Aspire CLI version
        shell: bash
        run: aspire --version

      - name: Push images and prepare env with Aspire
        shell: bash
        run: aspire do push-and-prepare-env --environment production --non-interactive

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aspire-output
          path: aspire-output/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: aspire-output
          path: aspire-output/

      - name: Deploy to Portainer
        uses: cssnr/portainer-stack-deploy-action@v1
        with:
          token: ${{ secrets.PORTAINER_API_TOKEN }}
          url: ${{ secrets.PORTAINER_URL }}
          endpoint: 3
          name: trakt-tg-bot
          file: aspire-output/docker-compose.yaml
          env_file: aspire-output/.env.production
          standalone: true
          pull: true
          prune: true
